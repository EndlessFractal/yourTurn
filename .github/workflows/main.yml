name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Substitute Manifest and Download Links
        id: sub_manifest_link_version
        run: |
          sed -i 's|\${version}|${{ github.event.release.tag_name }}|g' module.json
          sed -i 's|\${manifest}|https://github.com/${{ github.repository }}/releases/latest/download/module.json|g' module.json
          sed -i 's|\${download}|https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip|g' module.json

      - name: Create Module Archive
        run: zip -r ./module.zip *

      - name: Update Versioned Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          draft: false
          prerelease: false
          files: |
            ./module.json
            ./module.zip

      - name: Update Latest Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: latest
          name: Latest
          body: ${{ github.event.release.body }}
          draft: false
          prerelease: false
          files: |
            ./module.json
            ./module.zip